<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronTier — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      margin: 0;
    }
    h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: -0.5px; }
    p.sub { color: #888; margin: 0 0 48px; }
    .links { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
    a.card {
      display: block;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px 24px;
      color: #f5f5f5;
      text-decoration: none;
      transition: border-color 0.15s;
    }
    a.card:hover { border-color: #f5f5f5; }
    a.card .label { font-weight: 600; font-size: 1rem; }
    a.card .desc { font-size: 0.85rem; color: #888; margin-top: 4px; }
    footer { margin-top: 64px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>IronTier</h1>
  <p class="sub">Legal Documents</p>
  <div class="links">
    <a class="card" href="privacy-policy.html">
      <div class="label">Privacy Policy</div>
      <div class="desc">How we collect, use, and protect your data</div>
    </a>
    <a class="card" href="terms-of-use.html">
      <div class="label">Terms of Use</div>
      <div class="desc">Rules and conditions for using the app</div>
    </a>
  </div>
  <footer>IronTier — Train. Log. Level up.</footer>
</body>
</html>
